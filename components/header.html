<!-- ============================================================
     CAMPUS CONNECT — components/header.html
     Loaded via fetch() into <div id="site-header"> on every page.
     core.js handles: lucide re-render, active nav link, cursor binding.
     ============================================================ -->
<nav class="site-nav">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4">

    <!-- Logo -->
    <a href="/index.html" data-page="index.html"
       class="flex items-center gap-2 cursor-none">
      <div class="w-9 h-9 bg-red-500 border-[3px] border-black rounded-lg flex items-center justify-center"
           style="box-shadow: 3px 3px 0 #000;">
        <span class="text-white font-black text-sm">C</span>
      </div>
      <span class="font-black text-sm tracking-tight uppercase">Campus Connect</span>
    </a>

    <!-- Desktop Nav Links -->
    <div class="hidden md:flex items-center gap-8">
      <a href="/pages/search.html"   data-page="search.html"
         class="font-semibold text-sm hover:text-red-500 transition-colors cursor-none">
        Buy Books
      </a>
      <a href="/pages/add-book.html" data-page="add-book.html"
         class="font-semibold text-sm hover:text-red-500 transition-colors cursor-none">
        Sell Books
      </a>
      <a href="#"                    data-page="community.html"
         class="font-semibold text-sm hover:text-red-500 transition-colors cursor-none">
        Community
      </a>
    </div>

    <!-- Right Actions -->
    <div class="flex items-center gap-3">

      <!-- Messages -->
      <a href="/pages/messages.html" data-page="messages.html"
         class="w-9 h-9 border-[3px] border-black rounded-full flex items-center justify-center
                hover:bg-yellow-200 transition-colors cursor-none"
         style="box-shadow: 3px 3px 0 #000;" title="Messages">
        <i data-lucide="message-square" class="w-4 h-4"></i>
      </a>

      <!-- User avatar / login -->
      <a href="/pages/login.html" data-page="login.html" id="nav-user-btn"
         class="w-9 h-9 border-[3px] border-black rounded-full overflow-hidden cursor-none
                bg-gradient-to-br from-orange-300 to-red-400 flex items-center justify-center"
         style="box-shadow: 3px 3px 0 #000;" title="Account">
        <i data-lucide="user" class="w-4 h-4 text-white"></i>
      </a>

      <!-- Mobile menu toggle -->
      <button id="mobile-menu-btn"
              class="md:hidden w-9 h-9 border-[3px] border-black rounded-lg flex items-center
                     justify-center cursor-none"
              style="box-shadow: 3px 3px 0 #000;" aria-label="Toggle menu">
        <i data-lucide="menu" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <!-- Mobile Dropdown -->
  <div id="mobile-menu"
       class="md:hidden hidden border-t-[3px] border-black bg-[#fdfcf8] px-6 py-4 flex flex-col gap-4">
    <a href="/pages/search.html"   class="font-semibold text-sm cursor-none hover:text-red-500">Buy Books</a>
    <a href="/pages/add-book.html" class="font-semibold text-sm cursor-none hover:text-red-500">Sell Books</a>
    <a href="#"                    class="font-semibold text-sm cursor-none hover:text-red-500">Community</a>
    <a href="/pages/messages.html" class="font-semibold text-sm cursor-none hover:text-red-500">Messages</a>
    <a href="/pages/login.html"    class="font-semibold text-sm cursor-none hover:text-red-500">Login / Register</a>
  </div>
</nav>

<!-- Mobile menu toggle script (self-contained, no deps) -->
<script>
  (function () {
    const btn  = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    if (!btn || !menu) return;
    btn.addEventListener('click', () => menu.classList.toggle('hidden'));
  })();
</script>
